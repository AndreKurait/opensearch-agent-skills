# Skill sync configuration.
#
# Each entry below defines an upstream source — a directory in another
# git repo whose history is mirrored into this repo on a schedule.
#
# On every run, the sync script walks the source's history since the
# last-synced commit, extracts only the commits that touched `src_path`,
# rewrites them to live under `dest_path` in this repo, preserves the
# original author as a Co-authored-by trailer, and appends provenance
# trailers (Source-Repo, Source-Commit) so upstream attribution survives.
#
# Failures on one source do not block others — each source is processed
# in its own try-block and errors are reported at the end of the run.
#
# State (last-synced commit per source) is persisted in
# sync/state.json and committed alongside any imported skill changes.

sources:
  - name: opensearch-migrations
    url: https://github.com/AndreKurait/opensearch-migrations.git
    branch: main
    src_path: skills
    dest_path: skills/external/opensearch-migrations
